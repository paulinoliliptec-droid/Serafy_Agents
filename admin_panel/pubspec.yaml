name: admin_panel
description: agentOS-angola — Admin Panel (Flutter Web)
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^3.4.0
  firebase_auth: ^5.2.0
  cloud_firestore: ^5.2.0
  firebase_storage: ^12.2.0

  # UI
  fl_chart: ^0.68.0
  flutter_colorpicker: ^1.1.0
  cached_network_image: ^3.4.0

  # Files & export
  file_picker: ^8.1.2
  csv: ^6.0.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
